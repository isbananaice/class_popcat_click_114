<!DOCTYPE html>

<html lang="en">
    <head>
        <title>POPCAT CLASSIC</title>
        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: sans-serif;
            }

            .container {
                height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                background-color: #bdaa90;
            }

            .title-box {
                width: 80%;
                max-width: 600px;
                margin-top: 2em;
                text-align: center;
            }

            .title {
                width: 100%;
                height: auto;
            }

            .text-box {
                width: 100%;
                max-width: 800px;
                flex: 1;
            }

            .cat-img {
                width: 100%;
                height: 100%;
                text-align: center;
                color: white;
                font-size: 80px;
                -webkit-text-stroke: 3px black;
                user-select: none;
                background-position: bottom;
                background-size: contain;
                background-repeat: no-repeat;
            }

            #p {
                background-image: url("imgs/p.png");
            }

            #op {
                background-image: url("imgs/op.png");
            }
        </style>
    </head>

    <body>
        <div class="container">
            <div class="title-box">
                <img class="title" src="imgs/popcat.svg" alt="POPCAT goes here">
            </div>
            <div class="text-box">
                <div class="cat-img" id="p">0</div>
            </div>
        </div>

        <script>
            const catCounter = document.querySelector(".cat-img");
            let count = Number(catCounter.textContent) || 0;
            let mousePressed = false;
            let touchPressed = false;
            const keyboardPressed = new Set();

            function updateImage() {
                const isPressed = mousePressed || touchPressed || keyboardPressed.size > 0;
                catCounter.id = isPressed ? "op" : "p";
            }

            function increaseCount() {
                count += 1;
                catCounter.textContent = count;
            }

            catCounter.addEventListener("mousedown", () => {
                if (!mousePressed) {
                    mousePressed = true;
                    increaseCount();
                }
                updateImage();
            });

            window.addEventListener("mouseup", () => {
                mousePressed = false;
                updateImage();
            });

            catCounter.addEventListener("touchstart", (event) => {
                event.preventDefault();
                if (!touchPressed) {
                    touchPressed = true;
                    increaseCount();
                }
                updateImage();
            }, { passive: false });

            window.addEventListener("touchend", () => {
                touchPressed = false;
                updateImage();
            });

            window.addEventListener("touchcancel", () => {
                touchPressed = false;
                updateImage();
            });

            window.addEventListener("keydown", (event) => {
                if (event.repeat) {
                    return;
                }

                const wasEmpty = keyboardPressed.size === 0;
                keyboardPressed.add(event.code || event.key);

                if (wasEmpty) {
                    increaseCount();
                }

                updateImage();
            });

            window.addEventListener("keyup", (event) => {
                keyboardPressed.delete(event.code || event.key);
                updateImage();
            });
        </script>
    </body>
</html>
